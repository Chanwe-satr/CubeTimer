<!DOCTYPE html>

<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="theme-color" content="#171717">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>鏋侀€熼瓟鏂硅鏃跺櫒 | SpeedCube Timer</title>



    <!-- 浼樺寲1: 棰勮繛鎺ュ瓧浣撴湇鍔″櫒 -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

   

    <!-- Web App Manifest Placeholder -->

    <link rel="manifest" id="manifest-placeholder">



    <!-- 浼樺寲2: 寮傛鍔犺浇澶栭儴 CSS -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

   

    <!-- Tailwind CSS -->

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">

</head>

<body class="h-screen flex flex-col overflow-hidden">



    <!-- Header -->

    <header class="flex justify-between items-center px-4 md:px-6 py-3 bg-neutral-900 border-b border-neutral-800 shrink-0 z-30">

        <div class="flex items-center gap-2">

            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>

                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>

                <line x1="12" y1="22.08" x2="12" y2="12"></line>

            </svg>

            <div class="flex flex-col justify-center">

                <h1 class="text-xl font-extrabold tracking-tighter text-white leading-none" style="font-family: 'Montserrat', sans-serif;">

                    CUBE<span class="text-blue-500">TIMER</span>

                </h1>

                <span class="text-[0.5rem] tracking-[0.2em] text-neutral-500 uppercase font-bold">Pro Edition</span>

            </div>

        </div>

        <div class="flex gap-3 items-center">

            <button id="installBtn" onclick="installApp()" class="hidden bg-blue-600 hover:bg-blue-500 text-white text-[10px] md:text-xs font-bold py-1 px-3 rounded-full transition">APP</button>

            <button onclick="clearHistory()" class="text-neutral-400 hover:text-red-400 p-2"><i class="fas fa-trash-alt"></i></button>

        </div>

    </header>



    <!-- Main Content -->

    <main class="flex-1 flex flex-col relative overflow-hidden" id="touchArea">

       

        <!-- Top Control Bar -->

        <div class="flex justify-center pt-2 z-20">

            <div class="relative">

                <select id="puzzleType" onchange="changePuzzleType()" class="bg-neutral-800 text-white text-xs md:text-sm font-bold py-1 pl-3 pr-8 rounded-full border border-neutral-700 focus:outline-none focus:border-blue-500 transition cursor-pointer">

                    <option value="333">3x3x3</option>

                    <option value="222">2x2x2</option>

                    <option value="444">4x4x4</option>

                </select>

            </div>

        </div>



        <!-- Scramble Area -->

        <div class="px-4 mt-1 flex flex-col items-center z-10 shrink-0">

            <!-- Scramble Text -->

            <div id="scrambleDisplay" class="scramble-text text-sm md:text-xl font-medium text-neutral-300 max-w-4xl cursor-pointer hover:text-white transition active:scale-95 mb-2 mt-2" onclick="newScramble()">

                Initializing...

            </div>



            <!-- Scramble Visualization (SVG) -->

            <div id="visualizer" class="w-full flex justify-center items-center h-[160px] md:h-[200px] transition-opacity duration-300 opacity-0">

                <!-- SVG injected by JS -->

            </div>

        </div>



        <!-- Timer Display -->

        <div class="flex-1 flex items-center justify-center flex-col z-10 min-h-0">

            <div id="timerDisplay" class="timer-font text-[24vw] md:text-[12rem] lg:text-[14rem] font-bold leading-none timer-idle select-none transition-colors duration-100">

                0.00

            </div>

            <div id="instruction" class="mt-2 md:mt-4 text-neutral-600 text-[10px] md:text-xs uppercase tracking-wider text-center opacity-60">

                <span class="hidden md:block">Press Space to Start</span>

                <span class="md:hidden">Hold Screen to Start</span>

            </div>

        </div>



        <!-- Footer Stats -->

        <div class="w-full bg-neutral-900/90 backdrop-blur-sm border-t border-neutral-800 p-2 md:p-4 z-20 safe-bottom shrink-0">

            <div class="max-w-4xl mx-auto grid grid-cols-4 gap-2 md:gap-4 text-center">

                <div class="flex flex-col"><span class="text-[10px] text-neutral-500 font-bold">SOLVES</span><span id="statCount" class="text-base font-bold">0</span></div>

                <div class="flex flex-col"><span class="text-[10px] text-neutral-500 font-bold">BEST</span><span id="statBest" class="text-base font-bold text-blue-400">--</span></div>

                <div class="flex flex-col"><span class="text-[10px] text-neutral-500 font-bold">Ao5</span><span id="statAo5" class="text-base font-bold text-yellow-400">--</span></div>

                <div class="flex flex-col"><span class="text-[10px] text-neutral-500 font-bold">Ao12</span><span id="statAo12" class="text-base font-bold text-purple-400">--</span></div>

            </div>

        </div>

    </main>



    <!-- History Sidebar -->

    <div class="bg-neutral-950 border-t border-neutral-800 h-32 md:h-56 flex flex-col shrink-0">

        <div class="px-4 py-2 bg-neutral-900 flex justify-between items-center border-b border-neutral-800">

            <span class="text-[10px] font-bold text-neutral-400 uppercase tracking-wider">HISTORY</span>

        </div>

        <div id="historyList" class="flex-1 overflow-y-auto p-2 grid grid-cols-2 lg:grid-cols-4 gap-2 content-start"></div>

    </div>



    <!-- Scripts -->
    <script src="app.js"></script>
</body>

</html>
